<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arshad AI Ad Studio</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f1a;
    color: white;
}

/* Navbar */
.navbar {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.logo {
    font-size: 26px;
    color: #00e6ff;
    text-shadow: 0 0 15px #00e6ff;
}

/* Hero */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 60px;
    color: #00e6ff;
    text-shadow: 0 0 25px #00e6ff;
}

.hero p {
    color: #ccc;
}

/* Button */
.btn {
    padding: 12px 30px;
    background: #00e6ff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

.btn:hover {
    background: #00bcd4;
    transform: scale(1.05);
}

/* Glass Box */
.box {
    background: rgba(255,255,255,0.05);
    margin: 30px;
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(15px);
}

/* Images */
.images img {
    width: 200px;
    margin: 10px;
    border-radius: 10px;
    transition: 0.3s;
}

.images img:hover {
    transform: scale(1.1);
}

/* Services Grid */
.services {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.service-card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    width: 200px;
    transition: 0.3s;
}

.service-card:hover {
    transform: translateY(-10px);
    background: rgba(0,230,255,0.2);
}

/* Footer */
.footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
}
</style>

</head>

<body>

<div class="navbar">
    <div class="logo">Arshad AI Ad Studio</div>
</div>

<div class="hero">
    <h1>Create with AI</h1>
    <p>Logos, Thumbnails, Ads & Full Creative Design</p>
    <button class="btn">Get Started</button>
</div>

<div class="box">
    <h2>Our Work</h2>
    <div class="images">
        <img src="image1.jpg">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>
</div>

<div class="box">
    <h2>Our Services</h2>
    <div class="services">
        <div class="service-card">Thumbnail Design</div>
        <div class="service-card">Logo Design</div>
        <div class="service-card">Facebook Ads</div>
        <div class="service-card">YouTube Ads</div>
        <div class="service-card">Video Editing</div>
        <div class="service-card">AI Design</div>
    </div>
</div>

<div class="footer">
    © 2026 Arshad AI Ad Studio
</div>

</body>
</html>
